<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0a0a14"/>
  <defs>
    <linearGradient id="spiro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#c44dff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#4dc9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bffa1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Spirograph-like pattern using overlapping ellipses -->
  <g transform="translate(200,200)" fill="none" stroke="url(#spiro-grad)" stroke-width="1.2" opacity="0.9">
    <ellipse rx="120" ry="80" transform="rotate(0)"/>
    <ellipse rx="120" ry="80" transform="rotate(15)"/>
    <ellipse rx="120" ry="80" transform="rotate(30)"/>
    <ellipse rx="120" ry="80" transform="rotate(45)"/>
    <ellipse rx="120" ry="80" transform="rotate(60)"/>
    <ellipse rx="120" ry="80" transform="rotate(75)"/>
    <ellipse rx="120" ry="80" transform="rotate(90)"/>
    <ellipse rx="120" ry="80" transform="rotate(105)"/>
    <ellipse rx="120" ry="80" transform="rotate(120)"/>
    <ellipse rx="120" ry="80" transform="rotate(135)"/>
    <ellipse rx="120" ry="80" transform="rotate(150)"/>
    <ellipse rx="120" ry="80" transform="rotate(165)"/>
  </g>
  <!-- Inner pattern -->
  <g transform="translate(200,200)" fill="none" stroke="url(#spiro-grad)" stroke-width="0.8" opacity="0.5">
    <ellipse rx="70" ry="45" transform="rotate(7.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(22.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(37.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(52.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(67.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(82.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(97.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(112.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(127.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(142.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(157.5)"/>
    <ellipse rx="70" ry="45" transform="rotate(172.5)"/>
  </g>
  <!-- Center glow -->
  <circle cx="200" cy="200" r="8" fill="#c44dff" opacity="0.6"/>
  <circle cx="200" cy="200" r="3" fill="white" opacity="0.8"/>
</svg>
