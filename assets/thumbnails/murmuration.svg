    <use href="#murm-bird" transform="translate(172,226) rotate(-3) scale(1.15)"/>
    <use href="#murm-bird" transform="translate(192,210) rotate(6) scale(1.25)"/>
    <use href="#murm-bird" transform="translate(206,196) rotate(8) scale(1)"/>
